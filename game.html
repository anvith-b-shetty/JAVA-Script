<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>
        <div class="mode-selection">
            <button id="single-player-btn">Single Player</button>
            <button id="two-player-btn">Two Player</button>
        </div>
        <div class="score-board">
            <div class="score">
                <h2>Player 1: <span id="player1-score">0</span></h2>
            </div>
            <div class="score">
                <h2 id="player2-score-title">Player 2: <span id="player2-score">0</span></h2>
            </div>
        </div>
        <div class="game">
            <div class="player">
                <h2>Player 1</h2>
                <button class="choice" data-choice="rock">✊</button>
                <button class="choice" data-choice="paper">✋</button>
                <button class="choice" data-choice="scissors">✌️</button>
                <p id="player1-choice">Your choice: </p>
            </div>
            <div class="player" id="player2-section">
                <h2 id="player2-title">Player 2</h2>
                <button class="choice" data-choice="rock">✊</button>
                <button class="choice" data-choice="paper">✋</button>
                <button class="choice" data-choice="scissors">✌️</button>
                <p id="player2-choice">Your choice: </p>
            </div>
        </div>
        <h2 id="result"></h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
